<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

<style>
body {
  background: #0d1117;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.markdown-body {
  max-width: 800px;
  background: #161b22;
  padding: 40px;
  border-radius: 12px;
}

a {
  display: inline-block;
  margin-bottom: 20px;
  color: #7aa2f7;
  text-decoration: none;
}
</style>
</head>

<body>

<a href="index.html">← Back</a>

<div id="content" class="markdown-body"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
const params = new URLSearchParams(location.search);
const file = params.get('file');

fetch(`./posts/${file}`)
  .then(res => res.text())
  .then(md => {

    // 👇 先处理 Obsidian 语法（关键）
    md = convertImages(md);
    md = convertWikiLinks(md);

    const html = marked.parse(md);
    document.getElementById('content').innerHTML = html;
  });

function convertWikiLinks(md) {
  return md.replace(/\[\[(.*?)\]\]/g, (match, p1) => {
    const name = p1.trim();
    const file = encodeURIComponent(name + ".md");
    return `[${name}](post.html?file=english/${file})`;
  });
}

function convertImages(md) {
  return md.replace(/!\[\[(.*?)\]\]/g, (match, p1) => {
    return `![](posts/english/${p1})`;
  });
}
</script>

</body>
</html>
